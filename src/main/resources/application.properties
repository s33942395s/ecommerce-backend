# Database connection. Environment variables override local defaults.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:887985}

# Flyway owns schema changes. Hibernate only validates entity/schema alignment.
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Local development fallback only. Set JWT_SECRET outside the app in real environments.
app.jwt.secret=${JWT_SECRET:0Ig9MmtE2NM4RGECC5ECGDvFfREpT78YMjOtv7TtJW5}
